version: 1
project:
  title: "The disutility of uncertainty: welfare costs of noisy tax perceptions"
  authors:
    - name: Max Ghenis
  copyright: '2025'
  github: maxghenis/disutility-of-uncertainty
  thebe:
    binder:
      repo: maxghenis/disutility-of-uncertainty
      provider: github
      url: https://mybinder.org
      ref: main
  bibliography:
    - references.bib
  exports:
    - format: pdf
      template: plain_latex_book
      output: exports/tax-uncertainty.pdf
  toc:
    - file: index.md
    - title: Introduction
      children:
        - file: chapters/introduction.md
        - file: chapters/literature_review.md
    - title: Model
      children:
        - file: chapters/model.md
        - file: chapters/calibration.md
    - title: Results
      children:
        - file: chapters/results.md
        - file: chapters/extensions.md
    - title: Conclusion
      children:
        - file: chapters/conclusion.md
    - title: Appendix
      children:
        - file: chapters/technical_appendix.md
site:
  options:
    logo: ''
    folders: true
  template: book-theme
